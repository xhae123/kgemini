name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Import GPG key
        run: |
          echo "${{ secrets.GPG_SIGNING_KEY }}" | gpg --batch --import
          echo "signing.gnupg.executable=gpg" >> gradle.properties
          echo "signing.gnupg.keyName=${{ secrets.GPG_SIGNING_KEY_ID }}" >> gradle.properties
          echo "signing.gnupg.passphrase=${{ secrets.GPG_SIGNING_PASSWORD }}" >> gradle.properties

      - name: Build and test
        run: ./gradlew build

      - name: Publish to Maven Central
        run: ./gradlew publishAllPublicationsToMavenCentralRepository
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
